<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Latest global news updates in real-time. Stay informed with breaking news worldwide.">
<meta name="keywords" content="breaking news today, world news 2026, latest global headlines">
<title>Latest Global News Today | Breaking News 2026</title>

<!-- Monetag Script -->
<script src="https://quge5.com/88/tag.min.js" data-zone="224081" async data-cfasync="false"></script>

<!-- Banner Ad Script -->
<script>(function(s){s.dataset.zone='10833918',s.src='https://n6wxm.com/vignette.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>

<style>
body {font-family: Arial; margin:0; background:#0f172a; color:#fff}
header {background:#020617; padding:15px; text-align:center}
header h1 {color:#38bdf8}
nav {background:#1e293b; padding:10px; text-align:center}
nav a {color:#fff; margin:0 10px; text-decoration:none}
.container {max-width:1000px; margin:auto; padding:20px}
.news-card {background:#1e293b; padding:15px; margin-bottom:15px; border-radius:10px}
.news-card h2 {color:#38bdf8}
button {background:#38bdf8; border:none; padding:10px; cursor:pointer}
footer {text-align:center; padding:15px; background:#020617}
</style>
</head>

<body>
<header>
<h1>🌍 Global News Hub</h1>
<p>Live News (No API Needed)</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#">World</a>
<a href="#">Technology</a>
</nav>

<div class="container" id="news">Loading news...</div>

<footer>
<p>© 2026 Global News Hub</p>
</footer>

<script>
const newsContainer = document.getElementById("news");

async function fetchRSS() {
  try {
    const rssUrl = "https://feeds.bbci.co.uk/news/world/rss.xml";
    const api = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;

    const res = await fetch(api);
    const data = await res.json();

    newsContainer.innerHTML = "";

    data.items.slice(0,10).forEach(item => {
      const div = document.createElement("div");
      div.className = "news-card";

      div.innerHTML = `
        <h2>${item.title}</h2>
        <p>${item.description.replace(/<[^>]+>/g, '').substring(0,150)}...</p>
        <button onclick="goToAd('${item.link}')">Read More</button>
      `;

      newsContainer.appendChild(div);
    });

  } catch (err) {
    newsContainer.innerHTML = "Failed to load news.";
    console.error(err);
  }
}

function goToAd(url) {
  window.open("https://omg10.com/4/10803952", "_blank");
  setTimeout(() => {
    window.location.href = url;
  }, 2000);
}

fetchRSS();
</script>

</body>
</html>
